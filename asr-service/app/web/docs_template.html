<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>__DOC_TITLE__ - Qwen3-ASR Service</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f7fa; color: #333; min-height: 100vh; }
.container { max-width: 1200px; margin: 0 auto; padding: 24px 16px; }

.topnav { display: flex; justify-content: center; gap: 8px; margin-bottom: 16px; }
.topnav a { text-decoration: none; padding: 8px 20px; border-radius: 8px; background: #fff; color: #475569; font-size: 0.9em; font-weight: 600; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
.topnav a.active { background: #6366f1; color: #fff; }
.topnav a:hover { background: #eef2ff; color: #4f46e5; }
.topnav a.active:hover { background: #4f46e5; color: #fff; }

.layout { display: flex; gap: 16px; align-items: flex-start; }
.sidebar { flex: 0 0 200px; position: sticky; top: 16px; background: #fff; border-radius: 12px; padding: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.06); display: flex; flex-direction: column; gap: 2px; }
.sidebar a { text-decoration: none; padding: 8px 12px; border-radius: 8px; color: #475569; font-size: 0.88em; }
.sidebar a.active { background: #eef2ff; color: #4f46e5; font-weight: 600; }
.sidebar a:hover { background: #f1f5f9; }

.markdown-body { flex: 1; min-width: 0; background: #fff; border-radius: 12px; padding: 32px 40px; box-shadow: 0 1px 3px rgba(0,0,0,.06); line-height: 1.7; font-size: 0.95em; }
.markdown-body h1 { font-size: 1.7em; padding-bottom: 0.3em; border-bottom: 1px solid #e2e8f0; margin-bottom: 16px; color: #1a1a2e; }
.markdown-body h2 { font-size: 1.35em; padding-bottom: 0.3em; border-bottom: 1px solid #e2e8f0; margin: 28px 0 12px; color: #1a1a2e; }
.markdown-body h3 { font-size: 1.12em; margin: 22px 0 10px; color: #1a1a2e; }
.markdown-body h4 { font-size: 1em; margin: 18px 0 8px; color: #1a1a2e; }
.markdown-body p, .markdown-body ul, .markdown-body ol { margin-bottom: 12px; }
.markdown-body ul, .markdown-body ol { padding-left: 1.8em; }
.markdown-body li { margin-bottom: 4px; }
.markdown-body a { color: #4f46e5; text-decoration: none; }
.markdown-body a:hover { text-decoration: underline; }
.markdown-body code { background: #f1f5f9; padding: 2px 6px; border-radius: 4px; font-family: "SF Mono", Consolas, "Liberation Mono", monospace; font-size: 0.88em; color: #be185d; }
.markdown-body pre { background: #0f172a; color: #e2e8f0; padding: 14px 16px; border-radius: 8px; overflow-x: auto; margin-bottom: 14px; }
.markdown-body pre code { background: none; padding: 0; color: inherit; font-size: 0.86em; }
.markdown-body table { border-collapse: collapse; width: 100%; margin-bottom: 14px; display: block; overflow-x: auto; }
.markdown-body th, .markdown-body td { border: 1px solid #e2e8f0; padding: 8px 12px; text-align: left; }
.markdown-body th { background: #f8fafc; font-weight: 600; }
.markdown-body blockquote { border-left: 4px solid #c7d2fe; background: #f8fafc; padding: 8px 14px; color: #64748b; margin-bottom: 12px; border-radius: 0 8px 8px 0; }
.markdown-body blockquote p { margin-bottom: 0; }
.markdown-body hr { border: none; border-top: 1px solid #e2e8f0; margin: 24px 0; }
.markdown-body img { max-width: 100%; }

@media (max-width: 800px) {
  .layout { flex-direction: column; }
  .sidebar { position: static; flex: none; width: 100%; flex-direction: row; flex-wrap: wrap; }
  .markdown-body { padding: 20px 16px; width: 100%; }
}
</style>
</head>
<body>
  <div class="container">
    <div class="topnav">
      <a href="/web-ui">📄 离线转写</a>
      <a href="/web-ui/stream">🎙 实时转写</a>
      <a href="/web-ui/docs" class="active">📚 文档</a>
    </div>
    <div class="layout">
      <nav class="sidebar">__DOC_NAV__</nav>
      <main class="markdown-body">__DOC_BODY__</main>
    </div>
  </div>
</body>
</html>
